name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server — unit + integration (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: atlas_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install
        working-directory: server
        run: npm ci
      - name: Test (unit + integration)
        working-directory: server
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/atlas_test
          PGSSLMODE: disable
        run: npm test
      - name: Coverage report
        working-directory: server
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/atlas_test
          PGSSLMODE: disable
        run: npm run test:coverage 2>&1 | grep -E "all files|\.js\s+\|" || true

  web:
    name: Web — tests + production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Test
        working-directory: web
        run: npm test
      - name: Build
        working-directory: web
        run: npm run build
